<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links | Nome do Cliente</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="profile-pic">
                <img src="https://via.placeholder.com/150" alt="Foto de Perfil">
            </div>
            <h1>João Victor</h1>
            <p>Desenvolvedor Web Full-Stack | Soluções Digitais</p>
        </header>

        <main class="links-container">
            <!-- Link de Destaque -->
            <a href="#" class="link-card highlight">
                <i class="fab fa-whatsapp"></i>
                <span>Falar no WhatsApp</span>
            </a>

            <a href="#" class="link-card">
                <i class="fas fa-globe"></i>
                <span>Meu Site Oficial</span>
            </a>

            <a href="#" class="link-card">
                <i class="fab fa-instagram"></i>
                <span>Siga no Instagram</span>
            </a>

            <a href="#" class="link-card">
                <i class="fab fa-linkedin"></i>
                <span>Conectar no LinkedIn</span>
            </a>
        </main>

        <footer>
            <p>&copy; 2026 Criado por João Victor</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
